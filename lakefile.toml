name = "proetale"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Proetale", "Challenge", "Solution"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
backward.isDefEq.respectTransparency = false
weak.linter.mathlibStandardSet = true
weak.linter.style.header = false
# Switch off warnings generated by `sorry`
warn.sorry = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "9a568f0b75d28670664e6d6862d6e01c4625e380"

[[require]]
name = "upstreamer"
git = "https://github.com/chrisflav/upstreamer"
rev = "main"

[[lean_lib]]
name = "Proetale"

# Comparator (leanprover/comparator) challenge/solution pair for the comparison of
# ell-adic and etale cohomology, see Comparator/config.json. The `Definitions`
# library contains the mathlib-only definitions shared by challenge and solution.
[[lean_lib]]
name = "Definitions"
srcDir = "Comparator"

[[lean_lib]]
name = "Challenge"
srcDir = "Comparator"

[[lean_lib]]
name = "Solution"
srcDir = "Comparator"

# Local replacement for PatrickMassot/checkdecls, run by the blueprint CI step as
# `lake exe checkdecls blueprint/lean_decls`. The upstream version imports every
# lean_lib into one environment, which fails because Challenge and Solution
# intentionally declare the same names. See CheckDecls.lean.
[[lean_exe]]
name = "checkdecls"
root = "CheckDecls"
supportInterpreter = true
weakLinkArgs = ["-lLake"]
